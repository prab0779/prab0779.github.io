name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5   # ✅ updated

    - name: Setup Node.js
      uses: actions/setup-node@v5   # ✅ updated
      with:
        node-version: '22'          # ✅ upgrade from 18 → 22 (safe LTS)
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create .env file
      run: |
        echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
        echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

    - name: Build
      run: npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v5   # ✅ updated

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4   # ✅ updated
      with:
        path: './dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5   # ✅ updated
